<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Login - Sebamar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-sm">

        <h1 class="text-2xl font-bold text-center mb-6">Sebamar</h1>

        <form id="loginForm" class="space-y-4">

            <div>
                <label class="block text-sm text-gray-600 mb-1">Usuario</label>
                <input type="text" id="nombre"
                    class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    required />
            </div>

            <div>
                <label class="block text-sm text-gray-600 mb-1">Contraseña</label>
                <input type="password" id="password"
                    class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    required />
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
                Ingresar
            </button>

            <p id="error" class="text-red-500 text-sm text-center hidden"></p>

        </form>

    </div>

    <script type="module">
        import { Auth } from "../js/core/auth.js";

        const form = document.getElementById("loginForm");
        const errorEl = document.getElementById("error");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            errorEl.classList.add("hidden");

            const nombre = document.getElementById("nombre").value.trim();
            const password = document.getElementById("password").value.trim();

            const res = await Auth.login(nombre, password);

            if (!res.ok) {
                errorEl.textContent = res.error || "Error al iniciar sesión";
                errorEl.classList.remove("hidden");
                return;
            }

            window.location.href = "./dashboard.html";
        });
    </script>

</body>

</html>
