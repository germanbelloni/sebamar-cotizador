<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Nuevo Presupuesto</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div class="max-w-xl mx-auto p-6 space-y-4">

        <h1 class="text-xl font-bold">Nuevo Presupuesto</h1>

        <!-- CLIENTE -->
        <input id="cliente" placeholder="Cliente" class="w-full border p-2 rounded" />

        <!-- PRODUCTO -->
        <select id="producto" class="w-full border p-2 rounded">
            <option value="herrero">Herrero</option>
            <option value="modena">Modena</option>
        </select>

        <!-- MODELO -->
        <select id="modeloPuerta" class="w-full border p-2 rounded"></select>

        <!-- VIDRIO -->
        <select id="vidrio" class="w-full border p-2 rounded"></select>

        <!-- MEDIDA -->
        <select id="medidaPuerta" class="w-full border p-2 rounded"></select>

        <!-- BOTÓN -->
        <button id="calcular" class="bg-blue-600 text-white p-3 rounded w-full">
            Calcular
        </button>

        <!-- RESULTADO -->
        <div id="resultado"></div>

        <!-- DESCRIPCIÓN -->
        <div id="descripcion" class="bg-white p-3 rounded shadow text-sm"></div>

        <!-- DETALLE -->
        <div id="detalleCalculo" class="bg-white p-3 rounded shadow text-sm"></div>

        <!-- GUARDAR -->
        <button id="guardar" class="bg-green-600 text-white p-3 rounded w-full">
            Guardar Presupuesto
        </button>

    </div>

    <script type="module">
        import { Auth } from "../js/core/auth.js";
        import { Api } from "../js/core/api.js";

        import "../js/modules/puertas.js";
        import "../js/modules/ui.js";

        Auth.requireAuth();

        // 🔥 hacer global Api
        window.Api = Api;

        // 🔥 tipo desde submenu
        const tipoPuerta = localStorage.getItem("tipoPuerta") || "simple";
        window.tipoPuerta = tipoPuerta;

        // 🔥 INIT
        window.Puertas.init();

        document.getElementById("producto").addEventListener("change", () => {
            window.Puertas.cargarModelos();
        });

        document.getElementById("modeloPuerta").addEventListener("change", () => {
            window.Puertas.cambiarModelo();
        });

        // 🔥 MEDIDAS
        function cargarMedidas() {
            const tipo = window.tipoPuerta;
            const select = document.getElementById("medidaPuerta");

            select.innerHTML = "";

            const base = [70, 80, 90];

            if (tipo === "media") {
                const mapa = { 110: 70, 120: 80, 130: 90 };

                Object.entries(mapa).forEach(([visible, real]) => {
                    const option = document.createElement("option");
                    option.value = real;
                    option.textContent = `${visible}x200`;
                    select.appendChild(option);
                });

                return;
            }

            let factor = 1;
            if (tipo === "doble") factor = 2;
            if (tipo === "porton") factor = 3;

            base.forEach(m => {
                const option = document.createElement("option");
                option.value = m;
                option.textContent = `${m * factor}x200`;
                select.appendChild(option);
            });
        }

        cargarMedidas();

        // 🔥 DESCRIPCIÓN
        function generarDescripcion() {
            const producto = document.getElementById("producto").value;
            const modelo = document.getElementById("modeloPuerta").value;
            const vidrio = document.getElementById("vidrio").value;
            const medida = document.getElementById("medidaPuerta").selectedOptions[0].text;

            return `Puerta ${producto} ${modelo} ${medida} ${vidrio}`;
        }

        // 🔥 CALCULAR (LIMPIO Y CORRECTO)
        document.getElementById("calcular").addEventListener("click", () => {

            window.medidaSeleccionada =
                document.getElementById("medidaPuerta").value;

            window.Puertas.calcular();

            // descripción
            const desc = generarDescripcion();
            document.getElementById("descripcion").innerText = desc;

            // detalle
            const detalle = `
Modelo: ${document.getElementById("modeloPuerta").value}
Medida: ${document.getElementById("medidaPuerta").selectedOptions[0].text}
Vidrio: ${document.getElementById("vidrio").value}
Tipo: ${window.tipoPuerta}
`;

            document.getElementById("detalleCalculo").innerText = detalle;

            window.descripcionActual = desc;
        });

        // 🔥 GUARDAR (VERSIÓN PRO)
        document.getElementById("guardar").addEventListener("click", async () => {

            const cliente = document.getElementById("cliente").value;

            if (!cliente) {
                alert("Ingresá cliente");
                return;
            }

            if (!window.ultimoResultado) {
                alert("Primero tenés que calcular");
                return;
            }

            const item = {
                descripcion: window.descripcionActual,

                producto: document.getElementById("producto").value,
                modelo: document.getElementById("modeloPuerta").value,
                medida: document.getElementById("medidaPuerta").selectedOptions[0].text,
                vidrio: document.getElementById("vidrio").value,
                tipo: window.tipoPuerta,

                precio: window.ultimoResultado.total
            };

            const body = {
                cliente,
                items: [item],
                total: item.precio
            };

            const res = await Api.post("presupuestos", body);

            if (!res.ok) {
                alert(res.error);
                return;
            }

            alert("Presupuesto guardado");
        });

    </script>

</body>

</html>
